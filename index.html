<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aiden's SAT Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-900 pb-20">

    <header class="bg-white border-b p-6 mb-8 shadow-sm">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-indigo-700 italic">AIDEN_SAT_PORTAL</h1>
            <div class="flex gap-4 items-center">
                <span class="text-[10px] font-bold bg-indigo-100 text-indigo-700 px-2 py-1 rounded tracking-widest uppercase">Cloud Sync</span>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-7 space-y-6">
            <section class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2"><i class="fa-solid fa-pen-to-square text-indigo-500"></i> New Test Score</h2>
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <input type="text" id="title" placeholder="Test Title" class="p-2 border rounded text-sm">
                    <input type="date" id="test_date" class="p-2 border rounded text-sm">
                </div>
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div class="p-3 bg-blue-50 rounded-xl border border-blue-100">
                        <input type="number" id="math" placeholder="Math Total" class="w-full bg-transparent font-bold text-lg outline-none">
                        <div class="grid grid-cols-2 gap-2 mt-2">
                            <input type="number" id="m_alg" placeholder="Alg" class="bg-white border rounded p-1 text-[10px]">
                            <input type="number" id="m_adv" placeholder="Adv" class="bg-white border rounded p-1 text-[10px]">
                            <input type="number" id="m_psda" placeholder="PS" class="bg-white border rounded p-1 text-[10px]">
                            <input type="number" id="m_gt" placeholder="G/T" class="bg-white border rounded p-1 text-[10px]">
                        </div>
                    </div>
                    <div class="p-3 bg-purple-50 rounded-xl border border-purple-100">
                        <input type="number" id="english" placeholder="English Total" class="w-full bg-transparent font-bold text-lg outline-none">
                        <div class="grid grid-cols-2 gap-2 mt-2">
                            <input type="number" id="e_ii" placeholder="I&I" class="bg-white border rounded p-1 text-[10px]">
                            <input type="number" id="e_cs" placeholder="C&S" class="bg-white border rounded p-1 text-[10px]">
                            <input type="number" id="e_eoi" placeholder="EoI" class="bg-white border rounded p-1 text-[10px]">
                            <input type="number" id="e_sec" placeholder="SEC" class="bg-white border rounded p-1 text-[10px]">
                        </div>
                    </div>
                </div>
                <button onclick="saveScore()" class="w-full bg-indigo-600 text-white font-bold py-2 rounded-lg hover:bg-indigo-700 transition">Save Test</button>
            </section>

            <h2 class="text-xl font-black text-gray-400 uppercase tracking-widest text-center py-4">Progression</h2>
            <div id="scoreHistory" class="space-y-4"></div>
        </div>

        <div class="lg:col-span-5 space-y-6">
            <section class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2"><i class="fa-solid fa-chalkboard-user text-emerald-500"></i> New Tutor Log</h2>
                <div class="space-y-3 text-sm">
                    <div class="flex gap-2">
                        <div class="w-1/2"><label class="text-[10px] uppercase font-bold text-gray-400">Date</label><input type="date" id="s_date" class="w-full p-2 border rounded"></div>
                        <div class="w-1/2"><label class="text-[10px] uppercase font-bold text-gray-400">Next Class</label><input type="date" id="s_next" class="w-full p-2 border rounded"></div>
                    </div>
                    <input type="text" id="s_topic" placeholder="What did we study?" class="w-full p-2 border rounded">
                    <input type="text" id="s_res" placeholder="Resources used (Links/Pages)" class="w-full p-2 border rounded">
                    <button onclick="saveSession()" class="w-full bg-emerald-600 text-white font-bold py-2 rounded-lg hover:bg-emerald-700 transition">Log Session</button>
                </div>
            </section>

            <div id="sessionHistory" class="space-y-3"></div>

            <section class="bg-slate-900 text-white p-6 rounded-2xl shadow-lg">
                <h2 class="font-bold mb-4">Quick Resources</h2>
                <div id="resList" class="space-y-2 mb-4 text-xs"></div>
                <div class="flex gap-2 border-t border-white/10 pt-4">
                    <input type="text" id="r_title" placeholder="Name" class="w-1/2 bg-white/10 p-2 rounded outline-none text-xs">
                    <input type="text" id="r_url" placeholder="URL" class="w-1/2 bg-white/10 p-2 rounded outline-none text-xs">
                </div>
                <button onclick="saveResource()" class="w-full mt-2 bg-indigo-500 py-1 rounded text-[10px] font-bold">Add Link</button>
            </section>
        </div>
    </main>

    <script>
        const SB_URL = "https://ujiazulsmnwuzfszdeyk.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVqaWF6dWxzbW53dXpmc3pkZXlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2ODQxMTYsImV4cCI6MjA5MTI2MDExNn0.NllZMljM2TRbx7b9HesBgvoWpuIJwcrHBnWazJ_RQa0";
        const _sb = supabase.createClient(SB_URL, SB_KEY);

        // --- CORE FUNCTIONS ---
        async function saveScore() {
            const data = {
                title: document.getElementById('title').value || "SAT Test",
                test_date: document.getElementById('test_date').value || new Date().toISOString(),
                math: parseInt(document.getElementById('math').value) || 0,
                english: parseInt(document.getElementById('english').value) || 0,
                total: (parseInt(document.getElementById('math').value)||0) + (parseInt(document.getElementById('english').value)||0),
                m_alg: parseInt(document.getElementById('m_alg').value)||0, m_adv: parseInt(document.getElementById('m_adv').value)||0, m_psda: parseInt(document.getElementById('m_psda').value)||0, m_gt: parseInt(document.getElementById('m_gt').value)||0,
                e_ii: parseInt(document.getElementById('e_ii').value)||0, e_cs: parseInt(document.getElementById('e_cs').value)||0, e_eoi: parseInt(document.getElementById('e_eoi').value)||0, e_sec: parseInt(document.getElementById('e_sec').value)||0
            };
            await _sb.from('scores').insert([data]);
            loadAll();
        }

        async function saveSession() {
            const data = {
                session_date: document.getElementById('s_date').value,
                next_class: document.getElementById('s_next').value,
                topic: document.getElementById('s_topic').value,
                resources: document.getElementById('s_res').value
            };
            await _sb.from('sessions').insert([data]);
            loadAll();
        }

        async function saveResource() {
            await _sb.from('resources').insert([{ title: document.getElementById('r_title').value, url: document.getElementById('r_url').value }]);
            loadAll();
        }

        async function loadAll() {
            // Load Scores
            const { data: scores } = await _sb.from('scores').select('*').order('test_date', { ascending: false });
            document.getElementById('scoreHistory').innerHTML = scores?.map(s => `
                <div class="bg-white p-4 rounded-xl border border-gray-100 shadow-sm">
                    <div class="flex justify-between items-center mb-2">
                        <span class="font-black text-indigo-700">${s.title}</span>
                        <span class="text-2xl font-black">${s.total}</span>
                    </div>
                    <div class="grid grid-cols-2 gap-4 text-[10px] text-gray-500 bg-gray-50 p-2 rounded">
                        <div>Math: ${s.math} (A:${s.m_alg} M:${s.m_adv} P:${s.m_psda} G:${s.m_gt})</div>
                        <div>Eng: ${s.english} (I:${s.e_ii} C:${s.e_cs} E:${s.e_eoi} S:${s.e_sec})</div>
                    </div>
                </div>
            `).join('') || '';

            // Load Sessions
            const { data: sessions } = await _sb.from('sessions').select('*').order('session_date', { ascending: false });
            document.getElementById('sessionHistory').innerHTML = sessions?.map(s => `
                <div class="bg-white p-4 rounded-xl border-l-4 border-emerald-500 shadow-sm relative group">
                    <button onclick="deleteSess(${s.id})" class="absolute top-2 right-2 opacity-0 group-hover:opacity-100 text-gray-300 hover:text-red-500"><i class="fa-solid fa-trash text-[10px]"></i></button>
                    <p class="text-[10px] font-bold text-gray-400 mb-1">SESSION: ${s.session_date}</p>
                    <h3 class="font-bold text-gray-800 mb-1">${s.topic}</h3>
                    <p class="text-xs text-gray-500 mb-2">${s.resources || ''}</p>
                    <div class="text-[10px] font-bold text-emerald-600 bg-emerald-50 inline-block px-2 py-1 rounded">Next: ${s.next_class || 'TBD'}</div>
                </div>
            `).join('') || '';

            // Load Links
            const { data: res } = await _sb.from('resources').select('*');
            document.getElementById('resList').innerHTML = res?.map(r => `<div class="flex justify-between truncate"><a href="${r.url}" target="_blank" class="hover:text-indigo-400">${r.title}</a></div>`).join('') || '';
        }

        async function deleteSess(id) { if(confirm('Delete log?')) { await _sb.from('sessions').delete().eq('id', id); loadAll(); } }

        loadAll();
    </script>
</body>
</html>
