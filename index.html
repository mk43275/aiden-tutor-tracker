<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aiden's SAT Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 text-gray-900 pb-20">

    <header class="bg-white border-b p-6 mb-8 shadow-sm">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-indigo-700">Aiden's Shared Tracker</h1>
            <div id="status" class="text-xs text-gray-400 font-mono">Cloud Sync Active</div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 grid grid-cols-1 md:grid-cols-3 gap-8">
        
        <div class="md:col-span-2 space-y-6">
            <section class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="text-lg font-bold mb-4">Log New Score</h2>
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <input type="number" id="math" placeholder="Math (800)" class="p-3 bg-blue-50 rounded-lg font-bold outline-none">
                    <input type="number" id="english" placeholder="English (800)" class="p-3 bg-purple-50 rounded-lg font-bold outline-none">
                </div>
                <textarea id="notes" placeholder="Session notes (e.g. Worked on Trig word problems)" class="w-full p-3 border rounded-lg text-sm mb-4 outline-none focus:border-indigo-500"></textarea>
                <button onclick="saveToCloud()" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700">Upload to Cloud</button>
            </section>

            <section class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="text-lg font-bold mb-4">Score History & Notes</h2>
                <div id="history" class="space-y-4">
                    </div>
            </section>
        </div>

        <div class="space-y-6">
            <section class="bg-indigo-900 text-white p-6 rounded-2xl shadow-lg">
                <h2 class="font-bold mb-4">Quick Links</h2>
                <div class="space-y-2 text-sm">
                    <a href="https://bluebook.collegeboard.org/" target="_blank" class="block p-2 hover:bg-white/10 rounded">Bluebook Exams</a>
                    <a href="https://www.khanacademy.org/sat" target="_blank" class="block p-2 hover:bg-white/10 rounded">Khan Academy</a>
                </div>
            </section>
        </div>
    </main>

    <script>
        // PASTE YOUR INFO HERE
        const SUPABASE_URL = "https://ujiazulsmnwuzfszdeyk.supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVqaWF6dWxzbW53dXpmc3pkZXlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2ODQxMTYsImV4cCI6MjA5MTI2MDExNn0.NllZMljM2TRbx7b9HesBgvoWpuIJwcrHBnWazJ_RQa0";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function saveToCloud() {
            const math = parseInt(document.getElementById('math').value);
            const english = parseInt(document.getElementById('english').value);
            const notes = document.getElementById('notes').value;

            if(!math || !english) return alert("Enter scores first!");

            const { error } = await _supabase.from('scores').insert([
                { math, english, total: math + english, notes }
            ]);

            if(error) alert("Error: " + error.message);
            else {
                document.getElementById('math').value = '';
                document.getElementById('english').value = '';
                document.getElementById('notes').value = '';
                loadData();
            }
        }

        async function loadData() {
            const { data } = await _supabase.from('scores').select('*').order('created_at', { ascending: false });
            if(data) {
                document.getElementById('history').innerHTML = data.map(s => `
                    <div class="p-4 border-l-4 border-indigo-500 bg-gray-50 rounded-r-lg">
                        <div class="flex justify-between font-bold">
                            <span>Total: ${s.total}</span>
                            <span class="text-xs text-gray-400">${new Date(s.created_at).toLocaleDateString()}</span>
                        </div>
                        <div class="text-sm text-gray-600 mb-2">Math: ${s.math} | English: ${s.english}</div>
                        ${s.notes ? `<p class="text-xs italic text-gray-500 border-t pt-2 mt-2">${s.notes}</p>` : ''}
                    </div>
                `).join('');
            }
        }

        loadData();
    </script>
</body>
</html>
