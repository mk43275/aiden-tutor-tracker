<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aiden's SAT Hub</title>
    <link rel="icon" type="image/png" href="logo.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        input[type="datetime-local"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 pb-20 font-sans">

    <header class="bg-slate-900 border-b border-slate-800 p-6 mb-8 shadow-2xl">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black text-indigo-400 tracking-tight">AIDEN_SAT_PORTAL</h1>
            <div class="flex gap-4 items-center">
                <span class="text-[10px] font-bold bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 px-3 py-1 rounded-full tracking-widest uppercase">
                    <i class="fa-solid fa-circle text-[6px] mr-2 animate-pulse"></i> Cloud Sync Active
                </span>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-7 space-y-8">
            <section class="bg-slate-900 p-6 rounded-2xl shadow-xl border border-slate-800">
                <h2 class="text-lg font-bold mb-6 flex items-center gap-2 text-indigo-400 uppercase tracking-wider">
                    <i class="fa-solid fa-square-poll-vertical"></i> Log Practice Test
                </h2>
                
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <input type="text" id="title" placeholder="Test Name" class="bg-slate-800 border border-slate-700 p-3 rounded-xl text-sm outline-none focus:border-indigo-500 transition text-white">
                    <input type="date" id="test_date" class="bg-slate-800 border border-slate-700 p-3 rounded-xl text-sm outline-none focus:border-indigo-500 transition text-white">
                </div>

                <div class="grid grid-cols-2 gap-6 mb-6">
                    <div class="space-y-4">
                        <div class="p-4 bg-slate-800/50 rounded-2xl border border-slate-700">
                            <label class="text-[10px] font-bold text-slate-400 uppercase mb-2 block">Math Total</label>
                            <input type="number" id="math" placeholder="800" class="w-full bg-transparent font-black text-3xl outline-none text-indigo-400">
                            <div class="grid grid-cols-2 gap-2 mt-4 pt-4 border-t border-slate-700">
                                <input type="number" id="m_alg" placeholder="Algebra" class="bg-slate-900 border border-slate-700 rounded p-2 text-[11px] outline-none focus:border-indigo-500">
                                <input type="number" id="m_adv" placeholder="Advanced" class="bg-slate-900 border border-slate-700 rounded p-2 text-[11px] outline-none focus:border-indigo-500">
                                <input type="number" id="m_psda" placeholder="Problem" class="bg-slate-900 border border-slate-700 rounded p-2 text-[11px] outline-none focus:border-indigo-500">
                                <input type="number" id="m_gt" placeholder="Geo/Trig" class="bg-slate-900 border border-slate-700 rounded p-2 text-[11px] outline-none focus:border-indigo-500">
                            </div>
                        </div>
                    </div>
                    <div class="space-y-4">
                        <div class="p-4 bg-slate-800/50 rounded-2xl border border-slate-700">
                            <label class="text-[10px] font-bold text-slate-400 uppercase mb-2 block">English Total</label>
                            <input type="number" id="english" placeholder="800" class="w-full bg-transparent font-black text-3xl outline-none text-indigo-400">
                            <div class="grid grid-cols-2 gap-2 mt-4 pt-4 border-t border-slate-700">
                                <input type="number" id="e_ii" placeholder="Info/Idea" class="bg-slate-900 border border-slate-700 rounded p-2 text-[11px] outline-none focus:border-indigo-500">
                                <input type="number" id="e_cs" placeholder="Craft/Str" class="bg-slate-900 border border-slate-700 rounded p-2 text-[11px] outline-none focus:border-indigo-500">
                                <input type="number" id="e_eoi" placeholder="Express" class="bg-slate-900 border border-slate-700 rounded p-2 text-[11px] outline-none focus:border-indigo-500">
                                <input type="number" id="e_sec" placeholder="Convent." class="bg-slate-900 border border-slate-700 rounded p-2 text-[11px] outline-none focus:border-indigo-500">
                            </div>
                        </div>
                    </div>
                </div>
                
                <textarea id="score_notes" placeholder="Notes for this test..." class="w-full bg-slate-800 border border-slate-700 p-3 rounded-xl text-sm mb-6 outline-none focus:border-indigo-500 min-h-[80px] text-white"></textarea>
                <button onclick="saveScore()" class="w-full bg-indigo-600 text-white font-black py-4 rounded-xl hover:bg-indigo-500 transition shadow-lg shadow-indigo-900/20 uppercase tracking-widest text-xs">Upload Comprehensive Score</button>
            </section>

            <h2 class="text-xl font-black text-slate-700 uppercase tracking-[0.3em] text-center py-4">Progression</h2>
            <div id="scoreHistory" class="space-y-4"></div>
        </div>

        <div class="lg:col-span-5 space-y-8">
            
            <section class="bg-indigo-950/30 p-6 rounded-2xl border border-indigo-500/20">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-indigo-300">
                    <i class="fa-solid fa-calendar-check"></i> UPCOMING TESTS
                </h2>
                <div id="upcomingList" class="space-y-3 mb-4"></div>
                <div class="flex gap-2 mb-2">
                    <input type="text" id="u_name" placeholder="Test Name" class="w-2/3 bg-slate-900 border border-slate-700 p-2 rounded-lg text-xs outline-none focus:border-indigo-500">
                    <input type="date" id="u_date" class="w-1/3 bg-slate-900 border border-slate-700 p-2 rounded-lg text-xs outline-none focus:border-indigo-500">
                </div>
                <button onclick="saveUpcoming()" class="w-full bg-indigo-500/20 text-indigo-300 border border-indigo-500/30 font-bold py-2 rounded-lg hover:bg-indigo-500/30 text-xs transition uppercase">Add Target Date</button>
            </section>

            <section class="bg-slate-900 p-6 rounded-2xl shadow-xl border border-slate-800">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-emerald-400">
                    <i class="fa-solid fa-clock-rotate-left"></i> TUTOR LOG
                </h2>
                <div class="space-y-4">
                    <div class="flex gap-2">
                        <div class="w-1/2">
                            <label class="text-[9px] uppercase font-bold text-slate-500 mb-1 block">Class Time</label>
                            <input type="datetime-local" id="s_date" class="w-full bg-slate-800 border border-slate-700 p-2 rounded-lg text-xs outline-none text-white">
                        </div>
                        <div class="w-1/2">
                            <label class="text-[9px] uppercase font-bold text-slate-500 mb-1 block">Next Due</label>
                            <input type="datetime-local" id="s_next" class="w-full bg-slate-800 border border-slate-700 p-2 rounded-lg text-xs outline-none text-white">
                        </div>
                    </div>
                    <input type="text" id="s_topic" placeholder="Focus Topic" class="w-full bg-slate-800 border border-slate-700 p-2 rounded-lg text-xs outline-none text-white">
                    <input type="text" id="s_res" placeholder="Resources Used" class="w-full bg-slate-800 border border-slate-700 p-2 rounded-lg text-xs outline-none text-white">
                    <button onclick="saveSession()" class="w-full bg-emerald-600/20 text-emerald-400 border border-emerald-500/30 font-bold py-2 rounded-lg hover:bg-emerald-600/30 transition text-xs uppercase">Log Session</button>
                </div>
            </section>

            <div id="sessionHistory" class="space-y-3"></div>

            <section class="bg-slate-900 p-6 rounded-2xl shadow-xl border border-slate-800">
                <h2 class="font-bold mb-4 border-b border-slate-800 pb-2 text-indigo-400">SHARED RESOURCES</h2>
                <div id="resList" class="space-y-2 mb-6 text-xs text-slate-400"></div>
                <div class="flex gap-2 pt-4">
                    <input type="text" id="r_title" placeholder="Name" class="w-1/2 bg-slate-800 border border-slate-700 p-2 rounded-lg outline-none text-xs text-white">
                    <input type="text" id="r_url" placeholder="URL" class="w-1/2 bg-slate-800 border border-slate-700 p-2 rounded-lg outline-none text-xs text-white">
                </div>
                <button onclick="saveResource()" class="w-full mt-2 bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 py-2 rounded-lg text-[10px] font-bold hover:bg-indigo-500/20 transition uppercase">Add Link</button>
            </section>
        </div>
    </main>

    <script>
        const SB_URL = "https://ujiazulsmnwuzfszdeyk.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVqaWF6dWxzbW53dXpmc3pkZXlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2ODQxMTYsImV4cCI6MjA5MTI2MDExNn0.NllZMljM2TRbx7b9HesBgvoWpuIJwcrHBnWazJ_RQa0";
        const _sb = supabase.createClient(SB_URL, SB_KEY);

        const formatDT = (dt) => dt ? new Date(dt).toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : 'TBD';
        const clearInputs = (ids) => ids.forEach(id => { if(document.getElementById(id)) document.getElementById(id).value = ''; });

        async function saveScore() {
            const data = {
                title: document.getElementById('title').value || "Practice Test",
                test_date: document.getElementById('test_date').value || new Date().toISOString().split('T')[0],
                math: parseInt(document.getElementById('math').value) || 0,
                english: parseInt(document.getElementById('english').value) || 0,
                total: (parseInt(document.getElementById('math').value)||0) + (parseInt(document.getElementById('english').value)||0),
                m_alg: parseInt(document.getElementById('m_alg').value)||0, m_adv: parseInt(document.getElementById('m_adv').value)||0, m_psda: parseInt(document.getElementById('m_psda').value)||0, m_gt: parseInt(document.getElementById('m_gt').value)||0,
                e_ii: parseInt(document.getElementById('e_ii').value)||0, e_cs: parseInt(document.getElementById('e_cs').value)||0, e_eoi: parseInt(document.getElementById('e_eoi').value)||0, e_sec: parseInt(document.getElementById('e_sec').value)||0,
                notes: document.getElementById('score_notes').value 
            };
            await _sb.from('scores').insert([data]);
            loadAll();
        }

        async function saveUpcoming() {
            const data = { test_name: document.getElementById('u_name').value, test_date: document.getElementById('u_date').value };
            if(!data.test_name || !data.test_date) return;
            await _sb.from('upcoming_tests').insert([data]);
            clearInputs(['u_name', 'u_date']);
            loadAll();
        }

        async function saveSession() {
            const data = { session_date: document.getElementById('s_date').value, next_class: document.getElementById('s_next').value, topic: document.getElementById('s_topic').value, resources: document.getElementById('s_res').value };
            await _sb.from('sessions').insert([data]);
            loadAll();
        }

        async function saveResource() {
            await _sb.from('resources').insert([{ title: document.getElementById('r_title').value, url: document.getElementById('r_url').value }]);
            loadAll();
        }

        async function deleteRow(table, id) { if(confirm(`Delete?`)) { await _sb.from(table).delete().eq('id', id); loadAll(); } }

        async function loadAll() {
            const { data: scores } = await _sb.from('scores').select('*').order('test_date', { ascending: false });
            document.getElementById('scoreHistory').innerHTML = scores?.map(s => `
                <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-xl relative group">
                    <button onclick="deleteRow('scores', ${s.id})" class="absolute top-4 right-4 text-slate-600 hover:text-red-500 opacity-0 group-hover:opacity-100 transition"><i class="fa-solid fa-trash-can"></i></button>
                    <div class="flex justify-between items-start mb-6">
                        <div><h3 class="font-black text-indigo-400 uppercase text-lg">${s.title}</h3><p class="text-[10px] text-slate-500 font-mono uppercase">${s.test_date}</p></div>
                        <div class="text-right"><span class="text-4xl font-black text-white">${s.total}</span></div>
                    </div>
                    <div class="grid grid-cols-2 gap-8 text-[11px] border-t border-slate-800 pt-6">
                        <div class="space-y-2 text-slate-400">
                            <div class="font-bold text-indigo-300 mb-2 uppercase tracking-widest text-[10px]">Math Breakdown: ${s.math}</div>
                            <div class="flex justify-between"><span>Algebra</span><span class="text-white">${s.m_alg}</span></div>
                            <div class="flex justify-between"><span>Advanced</span><span class="text-white">${s.m_adv}</span></div>
                            <div class="flex justify-between"><span>Prob Solve</span><span class="text-white">${s.m_psda}</span></div>
                        </div>
                        <div class="space-y-2 border-l border-slate-800 pl-8 text-slate-400">
                            <div class="font-bold text-indigo-300 mb-2 uppercase tracking-widest text-[10px]">English Breakdown: ${s.english}</div>
                            <div class="flex justify-between"><span>Info/Ideas</span><span class="text-white">${s.e_ii}</span></div>
                            <div class="flex justify-between"><span>Craft/Str</span><span class="text-white">${s.e_cs}</span></div>
                            <div class="flex justify-between"><span>Expression</span><span class="text-white">${s.e_eoi}</span></div>
                        </div>
                    </div>
                    ${s.notes ? `<div class="mt-6 p-4 bg-slate-800/50 rounded-xl text-xs text-slate-300 italic border border-slate-700">Notes: ${s.notes}</div>` : ''}
                </div>
            `).join('') || '';

            const { data: up } = await _sb.from('upcoming_tests').select('*').order('test_date', { ascending: true });
            document.getElementById('upcomingList').innerHTML = up?.map(u => {
                const days = Math.ceil((new Date(u.test_date) - new Date()) / (1000 * 60 * 60 * 24));
                return `
                <div class="flex justify-between items-center bg-slate-900 p-4 rounded-xl border border-indigo-500/20 group">
                    <div>
                        <div class="text-xs font-bold text-indigo-200">${u.test_name}</div>
                        <div class="text-[10px] text-indigo-500 font-mono">${u.test_date}</div>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="text-[10px] font-black bg-indigo-500/20 text-indigo-300 px-3 py-1 rounded-full">${days} Days Left</span>
                        <button onclick="deleteRow('upcoming_tests', ${u.id})" class="opacity-0 group-hover:opacity-100 text-slate-600 hover:text-red-500 transition"><i class="fa-solid fa-xmark"></i></button>
                    </div>
                </div>`;
            }).join('') || '';

            const { data: sess } = await _sb.from('sessions').select('*').order('session_date', { ascending: false });
            document.getElementById('sessionHistory').innerHTML = sess?.map(s => `
                <div class="bg-slate-900 p-5 rounded-2xl border-l-4 border-emerald-500 shadow-lg relative group">
                    <button onclick="deleteRow('sessions', ${s.id})" class="absolute top-2 right-2 opacity-0 group-hover:opacity-100 text-slate-600 hover:text-red-500"><i class="fa-solid fa-trash text-[10px]"></i></button>
                    <p class="text-[10px] font-bold text-slate-500 mb-1 uppercase tracking-tighter">${formatDT(s.session_date)}</p>
                    <h3 class="font-bold text-slate-200 mb-2 leading-tight">${s.topic}</h3>
                    <div class="text-[10px] font-bold text-emerald-400 bg-emerald-500/10 inline-block px-3 py-1 rounded border border-emerald-500/20 mt-2">Next Class: ${formatDT(s.next_class)}</div>
                </div>
            `).join('') || '';

            const { data: res } = await _sb.from('resources').select('*');
            document.getElementById('resList').innerHTML = res?.map(r => `
                <div class="flex justify-between items-center group py-1 border-b border-slate-800 last:border-0">
                    <a href="${r.url}" target="_blank" class="hover:text-indigo-400 truncate pr-2">● ${r.title}</a>
                    <button onclick="deleteRow('resources', ${r.id})" class="opacity-0 group-hover:opacity-100 text-slate-600 hover:text-red-500 transition"><i class="fa-solid fa-xmark"></i></button>
                </div>
            `).join('') || '';
        }
        loadAll();
    </script>
</body>
</html>
